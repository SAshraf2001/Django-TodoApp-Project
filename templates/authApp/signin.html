{% extends 'index.html' %} {% block title %}Taskflow | Log In{% endblock title%} {% block body %}
<div class="container mt-5 mb-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-5">
          <div class="text-center mb-4">
            <h3 class="fw-bold text-success">Welcome Back</h3>
            <p class="text-muted small">Log in to access your workspace.</p>
          </div>

          <form action="{% url 'login' %}" method="post">
            {% csrf_token %}

            <div class="mb-3">
              <label
                for="loginusername"
                class="form-label text-muted small fw-bold"
                >Username</label
              >
              <input
                type="text"
                class="form-control bg-light"
                id="loginusername"
                name="loginusername"
                placeholder="Enter your username"
              />
            </div>

            <div class="mb-4">
              <label
                for="loginpassword"
                class="form-label text-muted small fw-bold"
                >Password</label
              >
              <input
                type="password"
                class="form-control bg-light"
                id="loginpassword"
                name="loginpassword"
                placeholder="Enter your password"
              />
            </div>

            <button
              type="submit"
              class="btn btn-success w-100 py-2 fw-bold shadow-sm"
            >
              Log In
            </button>
          </form>

          <div class="text-center mt-4">
            <p class="text-muted small">
              Don't have an account?
              <a
                href="{% url 'signup' %}"
                class="text-success text-decoration-none fw-bold"
                >Sign up here</a
              >.
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock body %}
