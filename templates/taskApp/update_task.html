{% extends 'index.html' %} {% block title %}Taskflow | Update Task{% endblock title %} {% block css %}
<!-- We are adding this here temporarily just so the Canvas Preview can see the styles! -->
<link
  href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css"
  rel="stylesheet"
  crossorigin="anonymous"
/>
{% endblock css %} {% block body %}
<div class="container mt-5 mb-5">
  <!-- Back Navigation -->
  <div class="row justify-content-center mb-4">
    <div class="col-md-8">
      <a href="{% url 'home' %}" class="text-decoration-none text-secondary">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="16"
          height="16"
          fill="currentColor"
          class="bi bi-arrow-left me-2"
          viewBox="0 0 16 16"
        >
          <path
            fill-rule="evenodd"
            d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z"
          />
        </svg>
        Back to Dashboard
      </a>
    </div>
  </div>

  <div class="row justify-content-center">
    <div class="col-md-8">
      <div
        class="card shadow border-0 rounded-4 border-top border-primary border-4"
      >
        <div class="card-body p-5">
          <h3 class="fw-bold text-dark mb-1">Update Task</h3>
          <p class="text-muted small mb-4">
            Edit the details below to update your task.
          </p>

          <!-- Raw HTML Form for Updating -->
          <!-- You will add action="{% url 'update_task' task.id %}" and method="post" here later -->
          <form>
            {% csrf_token %}

            <div class="mb-4">
              <label
                for="updateTaskName"
                class="form-label text-muted small fw-bold"
                >Task Name</label
              >
              <!-- You will add value="{{ task.taskName }}" here later -->
              <input
                type="text"
                class="form-control form-control-lg bg-light"
                id="updateTaskName"
                name="updateTaskName"
                placeholder="Update task title..."
                required
              />
            </div>

            <div class="mb-4">
              <label
                for="updateTaskDescription"
                class="form-label text-muted small fw-bold"
                >Task Description</label
              >
              <!-- You will inject {{ task.taskDescription }} between the textarea tags later -->
              <textarea
                class="form-control bg-light"
                id="updateTaskDescription"
                name="updateTaskDescription"
                rows="4"
                placeholder="Update task details..."
                required
              ></textarea>
            </div>

            <div class="row mb-4">
              <div class="col-md-6 mb-3 mb-md-0">
                <label
                  for="updateTaskCategory"
                  class="form-label text-muted small fw-bold"
                  >Category</label
                >
                <select
                  class="form-select bg-light"
                  id="updateTaskCategory"
                  name="updateTaskCategory"
                >
                  <!-- You will loop categories here later, checking for the current category to mark it 'selected' -->
                  <option value="" disabled>Select category...</option>
                </select>
              </div>

              <div class="col-md-6">
                <label
                  for="updateTaskStatus"
                  class="form-label text-muted small fw-bold"
                  >Status</label
                >
                <select
                  class="form-select bg-light"
                  id="updateTaskStatus"
                  name="updateTaskStatus"
                >
                  <!-- You will loop STATUS_CHOICES here later, checking for the current status to mark it 'selected' -->
                  <option value="" disabled>Select status...</option>
                </select>
              </div>
            </div>

            <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-5">
              <a
                href="{% url 'home' %}"
                class="btn btn-light px-4 me-md-2 fw-bold text-secondary"
                >Cancel</a
              >
              <button
                type="submit"
                class="btn btn-primary px-5 fw-bold shadow-sm"
              >
                Save Changes
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock body %}
